<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Application</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
            margin: 0;
        }

        .container {
            width: 300px;
            background: #fff;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        input {
            width: 70%;
            padding: 8px;
        }

        button {
            padding: 8px;
            margin-top: 10px;
        }

        ul {
            list-style-type: none;
            padding: 0;
        }

        li {
            padding: 10px;
            background: #eee;
            margin: 5px 0;
            display: flex;
            justify-content: space-between;
        }

        .completed {
            text-decoration: line-through;
            color: #888;
        }
    </style>

</head>

<body>

    <div class="container">
        <h2>My To-Do List</h2>
        <input type="text" id="newTaskInput" placeholder="Add a new task" />
        <button id="addTaskButton">Add Task</button>

        <ul id="taskList"></ul>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script> $(document).ready(function () {
            let taskList = [];

            // Fetch tasks from server (simulated with AJAX)
            function loadTasks() {
                $.ajax({
                    url: '/api/getTasks', // Replace with actual server endpoint
                    method: 'GET',
                    success: function (data) {
                        taskList = data;
                        renderTasks();
                    },
                    error: function () {
                        console.log('Error fetching tasks');
                    }
                });
            }

            // Save tasks to the server (simulated with AJAX)
            function saveTasks() {
                $.ajax({
                    url: '/api/saveTasks', // Replace with actual server endpoint
                    method: 'POST',
                    data: JSON.stringify(taskList),
                    contentType: 'application/json',
                    success: function () {
                        console.log('Tasks saved successfully');
                    },
                    error: function () {
                        console.log('Error saving tasks');
                    }
                });
            }

            // Render tasks to the page
            function renderTasks() {
                $('#taskList').empty();
                taskList.forEach((task, index) => {
                    $('#taskList').append(`
              <li class="${task.completed ? 'completed' : ''}">
                <span>${task.name}</span>
                <div>
                  <button class="complete" data-index="${index}">✓</button>
                  <button class="delete" data-index="${index}">🗑</button>
                </div>
              </li>
            `);
                });
            }

            // Add a new task
            $('#addTaskButton').click(function () {
                const taskName = $('#newTaskInput').val().trim();
                if (taskName) {
                    taskList.push({ name: taskName, completed: false });
                    saveTasks();
                    renderTasks();
                    $('#newTaskInput').val('');
                }
            });

            // Complete a task
            $('#taskList').on('click', '.complete', function () {
                const index = $(this).data('index');
                taskList[index].completed = !taskList[index].completed;
                saveTasks();
                renderTasks();
            });

            // Delete a task
            $('#taskList').on('click', '.delete', function () {
                const index = $(this).data('index');
                taskList.splice(index, 1);
                saveTasks();
                renderTasks();
            });

            // Load tasks on page load
            loadTasks();
        });

    </script>
</body>

</html>
